<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solva Beauty — Регистрация</title>
<meta name="description" content="Создайте аккаунт Solva Beauty — регистрация мастера">
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#FF69B4;--purple:#9370DB;
  --bg1:#0d0015;--bg2:#130820;--bg3:#0a1220;
  --white:#fff;
}

html{scroll-behavior:smooth;}

body{
  background:linear-gradient(150deg,#1e0030 0%,#160025 35%,#120020 65%,#1a0028 100%);
  background-attachment:fixed;
  color:var(--white);font-family:'Nunito',sans-serif;overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(147,112,219,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(147,112,219,.035) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0;
}

.glitter{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.spark{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,105,180,.85),transparent 70%);
  animation:twinkle 4s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:1;transform:scale(1);}}

nav{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;
  background:rgba(13,0,21,.8);backdrop-filter:blur(20px);
  border:1px solid rgba(255,105,180,.22);border-radius:50px;
  display:flex;align-items:center;gap:6px;
  padding:8px 8px 8px 28px;width:fit-content;max-width:calc(100% - 32px);
}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-right:20px;}
.logo-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.logo{
  font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:1px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-links{display:flex;gap:2px;}
.nav-links a{
  text-decoration:none;color:rgba(255,255,255,.55);font-size:13px;font-weight:700;
  padding:8px 16px;border-radius:30px;transition:all .2s;
}
.nav-links a:hover{background:rgba(255,105,180,.12);color:var(--pink);}
.nav-cta{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);
  padding:12px 26px;border-radius:30px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all .2s;letter-spacing:.5px;text-decoration:none;
}
.nav-cta:hover{background:rgba(255,255,255,.14);color:var(--pink);border-color:rgba(255,105,180,.3);}

.hero{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:120px 20px 60px;
  position:relative;z-index:1;
}
.hero-center{
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:2;max-width:800px;
}

.p-card{
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:28px 24px;position:relative;overflow:hidden;
  transition:border-color .3s,transform .2s;
  display:flex;flex-direction:column;width:100%;max-width:640px;margin:0 auto;
}
.p-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,105,180,.03),transparent 55%);pointer-events:none;
}
.p-card:hover{border-color:rgba(255,105,180,.35);transform:translateY(-2px);}

.card-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:12px;}

.modal-form{display:flex;flex-direction:column;gap:12px;}
.modal-input{
  padding:13px 16px;border-radius:10px;border:1.5px solid rgba(255,105,180,.3);
  background:rgba(255,255,255,.05);color:#fff;font-size:14px;
  font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;
}
.modal-input:focus{border-color:var(--pink);}
.modal-input::placeholder{color:rgba(255,255,255,.35);}
.modal-submit{
  padding:14px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:opacity .2s;letter-spacing:.5px;
}
.modal-submit:hover{opacity:.85;}
.modal-submit:disabled{opacity:.5;cursor:not-allowed;}
.modal-err{font-size:13px;color:#ff6b6b;text-align:center;display:none;}

.btn{
  display:inline-block;padding:12px 24px;border-radius:10px;
  font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;
  font-family:'Nunito',sans-serif;letter-spacing:.5px;border:none;transition:all .2s;text-align:center;
}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 8px 24px rgba(255,105,180,.25);}
.btn-primary:hover{transform:scale(1.02);opacity:.9;}

footer{border-top:1px solid rgba(255,255,255,.05);padding:44px 20px;text-align:center;position:relative;z-index:1;}
.footer-social{display:flex;justify-content:center;gap:12px;margin-bottom:24px;}
.social-link{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,105,180,.2);
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;text-decoration:none;
}
.social-link:hover{background:rgba(255,105,180,.15);border-color:rgba(255,105,180,.5);transform:translateY(-2px);}
.social-link svg{width:20px;height:20px;}
.footer-contacts{font-size:13px;font-weight:700;color:rgba(255,255,255,.35);margin-bottom:20px;letter-spacing:.3px;}
.footer-contacts a{color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;}
.footer-contacts a:hover{color:var(--pink);}
.footer-copy{font-size:12px;color:rgba(255,255,255,.18);letter-spacing:1px;}

@media(max-width:768px){
  nav{padding:8px 8px 8px 16px;gap:4px;}
  .nav-links{display:none;}
  .logo{font-size:16px;}
  .nav-cta{padding:10px 18px;font-size:12px;}
  .hero{padding:100px 16px 40px;min-height:auto;}
  .p-card{padding:20px 16px;}
}
</style>
</head>
<body>

<div class="glitter" id="glitter"></div>

<nav>
  <div class="logo-wrap">
    <div class="logo-icon">💅</div>
    <div class="logo">Solva Beauty</div>
  </div>
  <div class="nav-links">
    <a href="index.html">Главная</a>
    <a href="pay.html">Тарифы</a>
  </div>
  <a href="index.html" class="nav-cta">← Назад</a>
</nav>

<section class="hero">
  <div class="hero-center">
    <div class="p-card" style="max-width:400px;">
      <div class="card-title">Создать аккаунт</div>
      <p style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;line-height:1.5;">Зарегистрируйтесь, затем скачайте приложение Solva Beauty в App Store и войдите с этими же данными</p>
      <form class="modal-form" onsubmit="handleRegister(event)" style="display:flex;flex-direction:column;gap:12px;">
        <input type="text" id="regName" class="modal-input" placeholder="Имя" required>
        <input type="email" id="regEmail" class="modal-input" placeholder="Email" required autocomplete="email">
        <input type="tel" id="regPhone" class="modal-input" placeholder="Телефон (необязательно)">
        <input type="password" id="regPass" class="modal-input" placeholder="Пароль" required autocomplete="new-password">
        <p class="modal-err" id="regErr"></p>
        <button type="submit" class="modal-submit" id="regBtn">Зарегистрироваться</button>
      </form>
      <a href="account.html" style="display:block;text-align:center;margin-top:12px;font-size:13px;color:rgba(255,255,255,.5);">Уже есть аккаунт? Войти</a>
    </div>
  </div>
</section>

<footer>
  <div class="footer-social">
    <a href="mailto:beautybook@rambler.ru" class="social-link" aria-label="Email">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sg3" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FF69B4"/><stop offset="1" stop-color="#9370DB"/></linearGradient></defs>
        <rect x="2" y="4" width="20" height="16" rx="3" stroke="url(#sg3)" stroke-width="1.5"/>
        <path d="M2 8l10 7 10-7" stroke="url(#sg3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="https://www.instagram.com/solvo.beauty" class="social-link" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sg4" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FF69B4"/><stop offset="1" stop-color="#9370DB"/></linearGradient></defs>
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="url(#sg4)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="4.5" stroke="url(#sg4)" stroke-width="1.5"/>
        <circle cx="18" cy="6" r="1.2" fill="url(#sg4)"/>
      </svg>
    </a>
  </div>
  <p class="footer-contacts">📧 <a href="mailto:beautybook@rambler.ru">beautybook@rambler.ru</a></p>
  <p class="footer-copy">© 2026 SOLVA BEAUTY</p>
</footer>

<script>
(function(){
  const g=document.getElementById('glitter');
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='spark';
    const sz=Math.random()*3+2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*6}s;animation-duration:${3+Math.random()*5}s;`;
    g.appendChild(s);
  }
})();

async function handleRegister(e){
  e.preventDefault();
  const btn=document.getElementById('regBtn');
  const errEl=document.getElementById('regErr');
  const name=document.getElementById('regName').value;
  const email=document.getElementById('regEmail').value;
  const phone=document.getElementById('regPhone').value;
  const password=document.getElementById('regPass').value;

  btn.disabled=true;btn.textContent='Создаём аккаунт...';errEl.style.display='none';

  try{
    const resp=await fetch('https://beauty-bot-44ou.onrender.com/api/v1/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password,name,phone:phone||null}),
    });
    const data=await resp.json();
    if(!resp.ok){
      errEl.textContent=data.detail || 'Не удалось создать аккаунт. Попробуйте ещё раз.';
      errEl.style.display='block';
      btn.disabled=false;btn.textContent='Зарегистрироваться';
      return;
    }
    document.querySelector('.p-card').innerHTML='<div class="card-title">Аккаунт создан 🎉</div><p style="font-size:14px;color:rgba(255,255,255,.6);line-height:1.6;margin-top:12px;">Теперь скачайте приложение Solva Beauty в App Store и войдите с этими же email и паролем.</p><a href="index.html#cta" class="btn btn-primary" style="margin-top:16px;display:block;text-align:center;">Скачать приложение</a>';
  }catch(err){
    errEl.textContent='Ошибка соединения. Попробуйте ещё раз.';
    errEl.style.display='block';
    btn.disabled=false;btn.textContent='Зарегистрироваться';
  }
}
</script>
</body>
</html>
