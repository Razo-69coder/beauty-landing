<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solva Beauty — Личный кабинет</title>
<meta name="description" content="Личный кабинет мастера Solva Beauty — статус подписки, история платежей">
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#FF69B4;--purple:#9370DB;
  --bg1:#0d0015;--bg2:#130820;--bg3:#0a1220;
  --white:#fff;
}

html{scroll-behavior:smooth;}

body{
  background:linear-gradient(150deg,#1e0030 0%,#160025 35%,#120020 65%,#1a0028 100%);
  background-attachment:fixed;
  color:var(--white);font-family:'Nunito',sans-serif;overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(147,112,219,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(147,112,219,.035) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0;
}

.glitter{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.spark{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,105,180,.85),transparent 70%);
  animation:twinkle 4s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4);}50%{opacity:1;transform:scale(1);}}

nav{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;
  background:rgba(13,0,21,.8);backdrop-filter:blur(20px);
  border:1px solid rgba(255,105,180,.22);border-radius:50px;
  display:flex;align-items:center;gap:6px;
  padding:8px 8px 8px 28px;width:fit-content;max-width:calc(100% - 32px);
}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-right:20px;}
.logo-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.logo{
  font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:1px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-links{display:flex;gap:2px;}
.nav-links a{
  text-decoration:none;color:rgba(255,255,255,.55);font-size:13px;font-weight:700;
  padding:8px 16px;border-radius:30px;transition:all .2s;
}
.nav-links a:hover{background:rgba(255,105,180,.12);color:var(--pink);}
.nav-cta{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);
  padding:12px 26px;border-radius:30px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:all .2s;letter-spacing:.5px;text-decoration:none;
}
.nav-cta:hover{background:rgba(255,255,255,.14);color:var(--pink);border-color:rgba(255,105,180,.3);}

.hero{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:120px 20px 60px;
  position:relative;z-index:1;
}
.hero-center{
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:2;max-width:800px;
}

.p-card{
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:28px 24px;position:relative;overflow:hidden;
  transition:border-color .3s,transform .2s;
  display:flex;flex-direction:column;width:100%;max-width:640px;margin:0 auto;
}
.p-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,105,180,.03),transparent 55%);pointer-events:none;
}
.p-card:hover{border-color:rgba(255,105,180,.35);transform:translateY(-2px);}

.card-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:12px;}

.progress-bar-bg{height:10px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin:12px 0 8px;}
.progress-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .6s ease;}

.table-wrap{overflow-x:auto;margin-top:12px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 8px;color:rgba(255,255,255,.4);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06);}
td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.7);}
tr:last-child td{border-bottom:none;}
.status-active{color:#4cd964;}
.status-expired{color:#ff6b6b;}
.text-warning{color:#ffcc00;}

.btn{
  display:inline-block;padding:12px 24px;border-radius:10px;
  font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;
  font-family:'Nunito',sans-serif;letter-spacing:.5px;border:none;transition:all .2s;text-align:center;
}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 8px 24px rgba(255,105,180,.25);}
.btn-primary:hover{transform:scale(1.02);opacity:.9;}
.btn-outline{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);}
.btn-outline:hover{background:rgba(255,255,255,.1);color:var(--pink);border-color:rgba(255,105,180,.3);}

.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:1000;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:linear-gradient(160deg,#1e0030,#130820);
  border:1px solid rgba(255,105,180,.35);border-radius:20px;
  padding:32px 28px;max-width:400px;width:100%;position:relative;
}
.modal-close{
  position:absolute;top:16px;right:16px;background:none;border:none;
  color:rgba(255,255,255,.4);font-size:22px;cursor:pointer;line-height:1;
}
.modal-close:hover{color:var(--pink);}
.modal-title{font-family:'Black Han Sans',sans-serif;font-size:22px;margin-bottom:6px;}
.modal-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;line-height:1.5;}
.modal-form{display:flex;flex-direction:column;gap:12px;}
.modal-input{
  padding:13px 16px;border-radius:10px;border:1.5px solid rgba(255,105,180,.3);
  background:rgba(255,255,255,.05);color:#fff;font-size:14px;
  font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;
}
.modal-input:focus{border-color:var(--pink);}
.modal-input::placeholder{color:rgba(255,255,255,.35);}
.modal-submit{
  padding:14px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:opacity .2s;letter-spacing:.5px;
}
.modal-submit:hover{opacity:.85;}
.modal-submit:disabled{opacity:.5;cursor:not-allowed;}
.modal-err{font-size:13px;color:#ff6b6b;text-align:center;display:none;}

.dashboard{display:none;padding:120px 20px 60px;position:relative;z-index:1;max-width:700px;margin:0 auto;}
.dashboard.open{display:block;}
.dash-greeting{font-family:'Black Han Sans',sans-serif;font-size:28px;margin-bottom:24px;}
.dash-grid{display:flex;flex-direction:column;gap:20px;}
.dash-empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,.4);font-size:15px;line-height:1.8;}

footer{border-top:1px solid rgba(255,255,255,.05);padding:44px 20px;text-align:center;position:relative;z-index:1;}
.footer-social{display:flex;justify-content:center;gap:12px;margin-bottom:24px;}
.social-link{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,105,180,.2);
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;text-decoration:none;
}
.social-link:hover{background:rgba(255,105,180,.15);border-color:rgba(255,105,180,.5);transform:translateY(-2px);}
.social-link svg{width:20px;height:20px;}
.footer-contacts{font-size:13px;font-weight:700;color:rgba(255,255,255,.35);margin-bottom:20px;letter-spacing:.3px;}
.footer-contacts a{color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;}
.footer-contacts a:hover{color:var(--pink);}
.footer-copy{font-size:12px;color:rgba(255,255,255,.18);letter-spacing:1px;}

@media(max-width:768px){
  nav{padding:8px 8px 8px 16px;gap:4px;}
  .nav-links{display:none;}
  .logo{font-size:16px;}
  .nav-cta{padding:10px 18px;font-size:12px;}
  .hero{padding:100px 16px 40px;min-height:auto;}
  .dashboard{padding:100px 16px 40px;}
  .dash-greeting{font-size:22px;}
  .p-card{padding:20px 16px;}
}
</style>
</head>
<body>

<div class="glitter" id="glitter"></div>

<nav>
  <div class="logo-wrap">
    <div class="logo-icon">💅</div>
    <div class="logo">Solva Beauty</div>
  </div>
  <div class="nav-links">
    <a href="index.html">Главная</a>
    <a href="pay.html">Тарифы</a>
  </div>
  <a href="index.html" class="nav-cta">← Назад</a>
</nav>

<section class="hero" id="loginScreen">
  <div class="hero-center">
    <div class="p-card" style="max-width:400px;">
      <div class="card-title">Войти в аккаунт</div>
      <p style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;line-height:1.5;">Введите данные от приложения Solvo Beauty</p>
      <form class="modal-form" onsubmit="handleLogin(event)" style="display:flex;flex-direction:column;gap:12px;">
        <input type="email" id="loginEmail" class="modal-input" placeholder="Email" required autocomplete="email">
        <input type="password" id="loginPass" class="modal-input" placeholder="Пароль" required autocomplete="current-password">
        <p class="modal-err" id="loginErr"></p>
        <button type="submit" class="modal-submit" id="loginBtn">Войти</button>
      </form>
    </div>
  </div>
</section>

<div class="dashboard" id="dashboard">
  <div class="dash-greeting" id="dashGreeting">Привет, Мастер!</div>
  <div class="dash-grid">

    <div class="p-card">
      <div class="card-title">Статус подписки</div>
      <div id="subscriptionInfo">
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;">
          <span id="subStatusText">Активна</span>
          <span id="subDaysLeft">Осталось 30 дней</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:100%"></div>
        </div>
      </div>
      <div id="subInactive" style="display:none;">
        <p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:16px;">Подписка неактивна</p>
      </div>
      <a href="pay.html" class="btn btn-primary" style="margin-top:16px;width:100%;">Продлить подписку</a>
    </div>

    <div class="p-card">
      <div class="card-title">История платежей</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Дата</th><th>Тариф</th><th>Сумма</th><th>Статус</th></tr></thead>
          <tbody id="paymentsBody">
          </tbody>
        </table>
      </div>
      <div id="paymentsEmpty" style="display:none;text-align:center;padding:20px 0;color:rgba(255,255,255,.3);font-size:13px;">
        Платежей пока нет
      </div>
    </div>

  </div>
</div>

<footer>
  <div class="footer-social">
    <a href="mailto:beautybook@rambler.ru" class="social-link" aria-label="Email">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sg3" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FF69B4"/><stop offset="1" stop-color="#9370DB"/></linearGradient></defs>
        <rect x="2" y="4" width="20" height="16" rx="3" stroke="url(#sg3)" stroke-width="1.5"/>
        <path d="M2 8l10 7 10-7" stroke="url(#sg3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="https://www.instagram.com/solvo.beauty" class="social-link" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sg4" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FF69B4"/><stop offset="1" stop-color="#9370DB"/></linearGradient></defs>
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="url(#sg4)" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="4.5" stroke="url(#sg4)" stroke-width="1.5"/>
        <circle cx="18" cy="6" r="1.2" fill="url(#sg4)"/>
      </svg>
    </a>
  </div>
  <p class="footer-contacts">📧 <a href="mailto:beautybook@rambler.ru">beautybook@rambler.ru</a></p>
  <p class="footer-copy">© 2026 SOLVA BEAUTY</p>
</footer>

<script>
(function(){
  const g=document.getElementById('glitter');
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='spark';
    const sz=Math.random()*3+2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*6}s;animation-duration:${3+Math.random()*5}s;`;
    g.appendChild(s);
  }
})();

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const errEl=document.getElementById('loginErr');
  const email=document.getElementById('loginEmail').value;
  const password=document.getElementById('loginPass').value;

  btn.disabled=true;btn.textContent='Проверяем...';errEl.style.display='none';

  try{
    const resp=await fetch('https://beauty-bot-44ou.onrender.com/api/v1/account/web-info',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password}),
    });
    const data=await resp.json();
    if(!resp.ok){
      errEl.textContent='Неверный email или пароль';errEl.style.display='block';
      btn.disabled=false;btn.textContent='Войти';
      return;
    }
    showDashboard(data);
  }catch(err){
    errEl.textContent='Ошибка соединения. Попробуйте ещё раз.';errEl.style.display='block';
    btn.disabled=false;btn.textContent='Войти';
  }
}

function showDashboard(data){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').classList.add('open');

  document.getElementById('dashGreeting').textContent='Привет, '+data.name+'!';

  const now=new Date();
  let paidUntil=null;
  if(data.paid_until) paidUntil=new Date(data.paid_until+'Z');
  let trialEnd=null;
  if(data.trial_end_date) trialEnd=new Date(data.trial_end_date+'Z');

  const subActive=data.is_active;
  let daysLeft=0;
  let totalDays=30;
  let activeEndDate=null;

  if(paidUntil && paidUntil>now){
    activeEndDate=paidUntil;
  }else if(trialEnd && trialEnd>now && subActive){
    activeEndDate=trialEnd;
  }

  const subInfo=document.getElementById('subscriptionInfo');
  const subInactive=document.getElementById('subInactive');

  if(activeEndDate){
    subInfo.style.display='block';
    subInactive.style.display='none';
    const diffMs=activeEndDate-now;
    daysLeft=Math.max(0,Math.ceil(diffMs/(1000*60*60*24)));
    totalDays=Math.max(daysLeft,30);
    const pct=Math.min(100,Math.round((daysLeft/totalDays)*100));

    document.getElementById('subStatusText').textContent='Активна';
    const daysEl=document.getElementById('subDaysLeft');
    daysEl.textContent='Осталось '+daysLeft+' '+(daysLeft===1?'день':daysLeft<5?'дня':'дней');
    if(daysLeft<5) daysEl.style.color='#ffcc00';else daysEl.style.color='';
    document.getElementById('progressFill').style.width=pct+'%';
  }else{
    subInfo.style.display='none';
    subInactive.style.display='block';
  }

  const tbody=document.getElementById('paymentsBody');
  const empty=document.getElementById('paymentsEmpty');
  tbody.innerHTML='';

  if(!data.payments||data.payments.length===0){
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  data.payments.forEach(function(p){
    const tr=document.createElement('tr');
    let dateStr='—';
    if(p.paid_at){
      const d=new Date(p.paid_at+'Z');
      const dd=String(d.getDate()).padStart(2,'0');
      const mm=String(d.getMonth()+1).padStart(2,'0');
      const yyyy=d.getFullYear();
      dateStr=dd+'.'+mm+'.'+yyyy;
    }
    const amount=Number(p.amount||0).toFixed(2).replace('.',',')+' ₽';
    const planLabels={'pro_1m':'Pro 1м','pro_6m':'Pro 6м','pro_1y':'Pro 1г','pro_2y':'Pro 2г','biz_1m':'Бизнес 1м','biz_6m':'Бизнес 6м','biz_1y':'Бизнес 1г','biz_2y':'Бизнес 2г'};
    const planName=planLabels[p.plan]||p.plan;
    const statusText=p.status==='succeeded'?'✅ Оплачен':p.status;
    tr.innerHTML='<td>'+dateStr+'</td><td>'+planName+'</td><td>'+amount+'</td><td class="status-active">'+statusText+'</td>';
    tbody.appendChild(tr);
  });
}
</script>
</body>
</html>
